name: Copilot Setup Steps

on:
  workflow_dispatch:
  push:
    paths:
      - ".github/workflows/copilot-setup-steps.yml"
  pull_request:
    paths:
      - ".github/workflows/copilot-setup-steps.yml"

jobs:
  copilot-setup-steps:
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read
    strategy:
      matrix:
        include:
          - name: windows-ninja
            os: windows-latest
            buildType: ninja
          - name: linux-ninja
            os: ubuntu-latest
            buildType: ninja

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Generate build files (Ninja)
        shell: bash
        run: |
          cd "${{ github.workspace }}/Tools"
          "${{ github.workspace }}/Tools/generate_make_release.sh"

      - name: Install required development packages (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: |
          set -euxo pipefail
          sudo apt-get update
          sudo apt-get install -y cmake ninja-build libssl-dev zlib1g-dev libsqlite3-dev pkg-config
          sudo apt-get install -y uuid-dev || sudo apt-get install -y libuuid-dev

      - name: Build (Ninja)
        shell: bash
        run: |
          mkdir -p intermediate/make
          cd intermediate/make
          cmake --build . --config Release -- -j$(nproc || 2)
